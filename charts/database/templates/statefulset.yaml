apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.mongo.name }}
spec:
  serviceName: {{ .Values.mongo.headlessService.name }}
  replicas: {{ .Values.mongo.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.mongo.appLabel }}
  template:
    metadata:
      labels:
        app: {{ .Values.mongo.appLabel }}
    spec:
      containers:
        - name: mongo
          image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
          imagePullPolicy: {{ .Values.mongo.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.mongo.containerPort }}
          volumeMounts:
            - name: mongo-data
              mountPath: {{ .Values.mongo.volumeMountPath }}
  volumeClaimTemplates:
    - metadata:
        name: mongo-data
      spec:
        accessModes:
          - {{ .Values.mongo.persistence.accessMode }}
        storageClassName: {{ .Values.mongo.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.mongo.persistence.size }}