apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongo.service.name }}
spec:
  ports:
    - name: mongodb-svc
      port: {{ .Values.mongo.service.port }}
      targetPort: {{ .Values.mongo.service.targetPort }}
      protocol: TCP
  type: {{ .Values.mongo.service.type }}
  selector:
    app: {{ .Values.mongo.appLabel }}