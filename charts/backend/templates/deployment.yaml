apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    role: {{ .Values.backend.labels.role }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    type: {{ .Values.backend.strategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.backend.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.backend.strategy.rollingUpdate.maxUnavailable }}
  selector:
    matchLabels:
      role: {{ .Values.backend.labels.role }}
  template:
    metadata:
      labels:
        role: {{ .Values.backend.labels.role }}
    spec:
      serviceAccountName: secretmanager
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets
              readOnly: true
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.backend.containerPort }}
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "aws-secrets"