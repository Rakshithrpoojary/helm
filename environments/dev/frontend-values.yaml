frontend:

  replicaCount: 1

  image:
    repository: 050305920682.dkr.ecr.ap-south-1.amazonaws.com/ecomfront
    tag: "53"
    pullPolicy: Always

  containerPort: 80

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  labels:
    role: frontend