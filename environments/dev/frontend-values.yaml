frontend:

  replicaCount: 1

  image:
    repository: 518283888975.dkr.ecr.ap-south-1.amazonaws.com/chat-frontend
    tag: "15"
    pullPolicy: Always

  containerPort: 80

  service:
    type: ClusterIP
    port: 80
    targetPort: 80

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  labels:
    role: frontend