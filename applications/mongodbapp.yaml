apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Rakshithrpoojary/helm.git
    targetRevision: HEAD
    path: charts/database
    helm:
      valueFiles:
        - ../../environments/dev/mongodb-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: ecommercesecond
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true